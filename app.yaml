# Databricks Apps entrypoint.
# run_app.sh binds Streamlit to the port Databricks injects ($DATABRICKS_APP_PORT).
command:
  - bash
  - run_app.sh

env:
  # --- Provided dataset (Virtue Foundation marketplace share) ---
  - name: FACILITIES_TABLE
    value: "databricks_virtue_foundation_dataset_dais_2026.virtue_foundation_dataset.facilities"
  - name: DATABRICKS_SERVER_HOSTNAME
    value: "dbc-17fce1c9-2520.cloud.databricks.com"
  - name: DATABRICKS_HTTP_PATH
    value: "/sql/1.0/warehouses/0399c17f0139831e"
  # DATABRICKS_TOKEN is a secret — set it in the App's environment settings, NOT here.

  # --- LLM judge (Foundation Model API; auto-falls back to offline rules if unavailable) ---
  - name: DATABRICKS_MODEL_ENDPOINT
    value: "databricks-meta-llama-3-3-70b-instruct"

  # --- Lakebase persistence (optional; falls back to SQLite if left blank) ---
  - name: LAKEBASE_HOST
    value: ""
  - name: LAKEBASE_DATABASE
    value: "databricks_postgres"
  - name: LAKEBASE_USER
    value: ""
  - name: DATABRICKS_DATABASE_INSTANCE
    value: ""
